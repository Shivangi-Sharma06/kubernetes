apiVersion: v1
kind: Pod
metadata:
  name: myapp
  labels:
    name: myapp-pod
spec:
  containers:
    - name: myapp-container
      image: busybox:1.28
      env:
        - name: FIRSTNAME
          value: "shi"
  initContainers:
    - name: init-myservice
      image: busybox:1.28
      command: ['sh' , '-c']       #execute this command, in single quotes only
      args: ['until nslookup myservice.default.svc.cluster.local; do echo "waiting for service to be up"; sleep 2; done']
