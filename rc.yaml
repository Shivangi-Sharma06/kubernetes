apiVersion: v1
kind: ReplicationController
metadata:      #ye metadata bhi rc ka h
  name: nginx-rc
  labels:
    env: demo
spec:      #ye spec rc ka h
  template:
      metadata:   #ye sab metadata pod ka h 
        labels:
          env: demo
        name: nginx
      spec:           #ye sab spec bhi pod ka h
        containers:
          - image: nginx
            name: nginx
  replicas: 3    #this is the number of replicas you want          
